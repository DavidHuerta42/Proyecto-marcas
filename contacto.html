<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Hotel Mar Azul Ibiza</title>

</head>
<body>

<header>
    <h1>Hotel Mar Azul</h1>
    <p>Ibiza</p>
</header>

<nav>
    <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="habitaciones.html">Habitaciones</a></li>
        <li><a href="servicios.html">Servicios</a></li>
        <li><a href="contacto.html">Contacto</a></li>
    </ul>
</nav>

<main>

    <section class="contacto">
        <h2>Contacto y Reservas</h2>

        <form class="formulario">

            <div class="campo">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" required>
            </div>

            <div class="campo">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>

            <div class="campo">
                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" rows="4" required></textarea>
            </div>

            <button type="submit">Enviar mensaje</button>

        </form>

    </section>

</main>

<footer>
    <p>© 2026 Hotel Mar Azul Ibiza</p>
    <p>Email: info@hotelmarazul.com | Tel: +34 600 000 000</p>
</footer>

</body>
</html>
